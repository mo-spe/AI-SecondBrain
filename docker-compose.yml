version: "3.8"

services:
  # ============================================================
  # MySQL 数据库服务
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ai-second-brain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./complete_database_schema_verified.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./logs/mysql:/var/log/mysql
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --innodb-log-file-size=128M
      --max-connections=200
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long_query_time=2

  # ============================================================
  # Redis 缓存服务
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ai-second-brain-redis
    environment:
      TZ: ${TZ}
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - ai-second-brain-network
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Zookeeper 服务（Kafka 依赖）
  # ============================================================
  zookeeper:
    image: bitnami/zookeeper:3.8
    container_name: ai-second-brain-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: yes
      TZ: ${TZ}
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    volumes:
      - zookeeper-data:/bitnami/zookeeper
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Kafka 消息队列服务
  # ============================================================
  kafka:
    image: bitnami/kafka:3.6
    container_name: ai-second-brain-kafka
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT_STRING: zookeeper:2181
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: true
      ALLOW_PLAINTEXT_LISTENER: yes
      TZ: ${TZ}
    ports:
      - "${KAFKA_PORT}:9092"
    depends_on:
      zookeeper:
        condition: service_healthy
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # Elasticsearch 搜索引擎服务
  # ============================================================
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ai-second-brain-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: ${ES_JAVA_OPTS}
      xpack.security.enabled: "false"
      TZ: ${TZ}
    ports:
      - "${ES_PORT}:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # ============================================================
  # DeerFlow AI 服务
  # ============================================================
  deerflow:
    build:
      context: ./deerflow
      dockerfile: Dockerfile
    container_name: ai-second-brain-deerflow
    environment:
      QWEN_API_KEY: ${QWEN_API_KEY}
      QWEN_BASE_URL: ${QWEN_BASE_URL}
      QWEN_MODEL: ${QWEN_MODEL}
      TZ: ${TZ}
    ports:
      - "${DEERFLOW_PORT}:8000"
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ============================================================
  # 后端 Spring Boot 服务
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-second-brain-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=${TZ}&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      QWEN_API_KEY: ${QWEN_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER}
      QWEN_BASE_URL: ${QWEN_BASE_URL}
      QWEN_MODEL: ${QWEN_MODEL}
      QWEN_EMBEDDING_URL: ${QWEN_EMBEDDING_URL}
      QWEN_EMBEDDING_MODEL: ${QWEN_EMBEDDING_MODEL}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENAI_EMBEDDING_URL: ${OPENAI_EMBEDDING_URL}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL}
      DEERFLOW_API_URL: http://deerflow:8000
      DEERFLOW_API_TIMEOUT: ${DEERFLOW_API_TIMEOUT}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID}
      ALIYUN_OSS_ACCESS_KEY_SECRET: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
      ALIYUN_OSS_BUCKET_NAME: ${ALIYUN_OSS_BUCKET_NAME}
      MAIL_ENABLED: ${MAIL_ENABLED}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      JAVA_OPTS: ${JAVA_OPTS}
      TZ: ${TZ}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PATH: ${LOG_PATH}
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      deerflow:
        condition: service_healthy
    networks:
      - ai-second-brain-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    volumes:
      - ./logs/backend:/var/log/ai-second-brain

  # ============================================================
  # 前端构建服务（一次性构建）
  # ============================================================
  frontend-builder:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-second-brain-frontend-builder
    volumes:
      - frontend-dist:/app/dist
    networks:
      - ai-second-brain-network

  # ============================================================
  # Nginx Web 服务器
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ai-second-brain-nginx
    environment:
      TZ: ${TZ}
      DOMAIN_NAME: ${DOMAIN_NAME}
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - frontend-dist:/usr/share/nginx/html:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend-builder
    networks:
      - ai-second-brain-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  zookeeper-data:
    driver: local
  elasticsearch-data:
    driver: local
  frontend-dist:
    driver: local

networks:
  ai-second-brain-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
