<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token 诊断工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-width: 500px;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }

    .section {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 8px;
      background: #f5f5f5;
    }

    .section h2 {
      font-size: 18px;
      margin-bottom: 12px;
      color: #667eea;
    }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .status.success {
      background: #d4edda;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .status.warning {
      background: #fff3cd;
      color: #856404;
    }

    .info {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #333;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    .log {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 12px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Token 诊断工具</h1>

    <div class="section">
      <h2>Token 状态</h2>
      <div id="tokenStatus" class="status warning">检查中...</div>
      <div id="tokenInfo" class="info"></div>
    </div>

    <div class="section">
      <h2>存储数据</h2>
      <div id="storageStatus" class="status warning">检查中...</div>
      <div id="storageInfo" class="info"></div>
    </div>

    <div class="section">
      <h2>后端连接</h2>
      <div id="backendStatus" class="status warning">检查中...</div>
      <div id="backendInfo" class="info"></div>
    </div>

    <div class="section">
      <h2>操作</h2>
      <button class="btn-primary" id="checkTokenBtn">检查 Token</button>
      <button class="btn-secondary" id="clearStorageBtn">清除存储</button>
      <button class="btn-secondary" id="testBackendBtn">测试后端</button>
    </div>

    <div class="section hidden" id="logSection">
      <h2>日志</h2>
      <div id="log" class="log"></div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'http://localhost:8080/api';
    const logElement = document.getElementById('log');

    function log(message) {
      const timestamp = new Date().toLocaleTimeString();
      logElement.innerHTML += `[${timestamp}] ${message}<br>`;
      logElement.scrollTop = logElement.scrollHeight;
      document.getElementById('logSection').classList.remove('hidden');
    }

    function updateStatus(elementId, status, message) {
      const element = document.getElementById(elementId);
      element.className = `status ${status}`;
      element.textContent = message;
    }

    function updateInfo(elementId, message) {
      document.getElementById(elementId).textContent = message;
    }

    async function checkToken() {
      log('开始检查 Token...');
      
      try {
        const result = await chrome.storage.local.get(['authToken']);
        log('存储数据读取成功');
        
        if (result.authToken) {
          updateStatus('tokenStatus', 'success', '✅ Token 存在');
          updateInfo('tokenInfo', `Token 长度: ${result.authToken.length} 字符`);
          log(`Token 存在，长度: ${result.authToken.length}`);
          
          updateStatus('storageStatus', 'success', '✅ 存储正常');
          updateInfo('storageInfo', 'authToken 已存储');
          
          return result.authToken;
        } else {
          updateStatus('tokenStatus', 'error', '❌ Token 不存在');
          updateInfo('tokenInfo', '请先登录插件');
          log('Token 不存在');
          
          updateStatus('storageStatus', 'error', '❌ 存储为空');
          updateInfo('storageInfo', '未找到 authToken');
          
          return null;
        }
      } catch (error) {
        updateStatus('tokenStatus', 'error', '❌ 检查失败');
        updateInfo('tokenInfo', error.message);
        log(`检查失败: ${error.message}`);
        
        return null;
      }
    }

    async function testBackend() {
      log('开始测试后端连接...');
      updateStatus('backendStatus', 'warning', '测试中...');
      
      try {
        const response = await fetch(`${API_BASE_URL}/health`);
        const result = await response.json();
        
        if (response.ok && result.code === 200) {
          updateStatus('backendStatus', 'success', '✅ 后端正常');
          updateInfo('backendInfo', '后端服务运行正常');
          log('后端连接成功');
        } else {
          updateStatus('backendStatus', 'error', '❌ 后端异常');
          updateInfo('backendInfo', result.message || '后端返回错误');
          log(`后端异常: ${result.message}`);
        }
      } catch (error) {
        updateStatus('backendStatus', 'error', '❌ 连接失败');
        updateInfo('backendInfo', error.message);
        log(`连接失败: ${error.message}`);
      }
    }

    async function testTokenValidity(token) {
      if (!token) {
        log('Token 为空，跳过验证');
        return;
      }
      
      log('开始验证 Token 有效性...');
      
      try {
        const response = await fetch(`${API_BASE_URL}/auth/info`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });
        const result = await response.json();
        
        if (response.ok && result.code === 200) {
          log('Token 验证成功');
          log(`用户信息: ${JSON.stringify(result.data)}`);
        } else {
          log(`Token 验证失败: ${result.message}`);
        }
      } catch (error) {
        log(`Token 验证异常: ${error.message}`);
      }
    }

    async function clearStorage() {
      if (confirm('确定要清除所有存储数据吗？这将需要重新登录。')) {
        log('清除存储数据...');
        
        try {
          await chrome.storage.local.clear();
          log('存储数据已清除');
          
          updateStatus('tokenStatus', 'warning', '已清除');
          updateInfo('tokenInfo', '');
          
          updateStatus('storageStatus', 'warning', '已清除');
          updateInfo('storageInfo', '');
          
          alert('✅ 存储数据已清除，请重新登录');
        } catch (error) {
          log(`清除失败: ${error.message}`);
          alert('❌ 清除失败: ' + error.message);
        }
      }
    }

    document.getElementById('checkTokenBtn').addEventListener('click', async () => {
      const token = await checkToken();
      if (token) {
        await testTokenValidity(token);
      }
    });

    document.getElementById('clearStorageBtn').addEventListener('click', clearStorage);
    document.getElementById('testBackendBtn').addEventListener('click', testBackend);

    document.addEventListener('DOMContentLoaded', () => {
      log('诊断工具已加载');
      checkToken();
      testBackend();
    });
  </script>
</body>
</html>
